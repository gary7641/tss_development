<!DOCTYPE html>
<html lang="zh-HK" data-mode="light" data-theme="wood">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signal Helper - Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
  <!-- HEADER -->
  <header class="top-header">
    <div class="container-fluid d-flex justify-content-between align-items-center">
      <div class="d-flex align-items-center gap-3">
        <div class="magic-orb" id="main-orb">🌳</div>
        <h2 class="mb-0 text-white">Signal Helper</h2>
      </div>
      <div class="d-flex align-items-center gap-3">
        <button class="btn btn-light" id="theme-switch">Light / Dark</button>
        <div class="user-avatar" id="user-menu-trigger">Gary</div>
      </div>
    </div>
  </header>

  <div class="d-flex">
    <!-- SIDEBAR -->
    <nav class="sidebar bg-light border-end" style="width: 260px; min-height: 100vh;">
      <ul class="nav flex-column p-3">
        <li class="nav-item"><a class="nav-link active" href="#">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Live Signals</a></li>
        <li class="nav-item"><a class="nav-link" href="#">My Signals</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Register Signal</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Signal Group</a></li>
        <li class="nav-item"><a class="nav-link" href="#">User Portfolio</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Market News</a></li>
        <li class="nav-item"><a class="nav-link" href="#">World Monitor</a></li>
        <!-- P2 -->
        <li class="nav-item mt-4"><a class="nav-link" href="#">Cross Power Center</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Trade History Analyzer</a></li>
      </ul>
    </nav>

    <!-- MAIN -->
    <main class="flex-grow-1 p-4">
      <h1 class="mb-4">Dashboard</h1>

      <!-- Live Signals -->
      <h4>Top Live Signals (Highest Profit)</h4>
      <div class="row g-4" id="live-signals">
        <!-- 3 Cards will be generated by JS or static -->
      </div>

      <!-- Other sections: Cross Power, News, Forum -->
    </main>
  </div>

  <script src="js/theme-manager.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
