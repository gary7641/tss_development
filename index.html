<!DOCTYPE html>
<html lang="zh-HK" data-mode="light" data-theme="wood">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signal Helper - Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #f8f9f0; color: #2c3e2f; margin: 0; }
    .top-header { background: linear-gradient(90deg, #4a7043, #6b9b5e); color: white; padding: 1rem 1.5rem; }
    .sidebar { width: 260px; background: white; border-right: 1px solid #ddd; min-height: 100vh; padding: 1.5rem 1rem; transition: width 0.3s; }
    .sidebar.pinned { width: 280px; }
    .nav-link { font-size: 0.95rem; padding: 0.65rem 1rem; border-radius: 8px; }
    .nav-link.active, .nav-link:hover { background: #e8f0e8; color: #4a7043; font-weight: 600; }
    .live-signal-card { background: white; border-radius: 16px; padding: 1.5rem; box-shadow: 0 8px 25px rgba(74,112,67,0.12); height: 420px; display: flex; flex-direction: column; }
    .live-signal-card .profit { font-size: 2.2rem; font-weight: 700; color: #4a7043; }
    .live-signal-card .dd { font-size: 1.1rem; color: #e63939; }
    .live-signal-card .curve { flex: 1; background: #f0f4f0; border-radius: 12px; margin: 1rem 0; }
    .magic-orb { width: 52px; height: 52px; border-radius: 50%; background: radial-gradient(circle at 40% 30%, #fff9, #4a7043); box-shadow: 0 0 25px rgba(74,112,67,0.7); display: flex; align-items: center; justify-content: center; font-size: 1.8rem; cursor: pointer; }
  </style>
</head>
<body>
  <!-- HEADER (乾淨) -->
  <header class="top-header">
    <div class="d-flex justify-content-between align-items-center">
      <div class="d-flex align-items-center gap-3">
        <div class="magic-orb">🌳</div>
        <h4 class="mb-0">Signal Helper</h4>
      </div>
      <div class="d-flex align-items-center gap-3">
        <button class="btn btn-light btn-sm" id="theme-switch">🌿</button>
        <div class="magic-orb" id="main-orb">🪵</div>
        <div id="user-menu" class="cursor-pointer">Gary 珅緒 ▼</div>
      </div>
    </div>
  </header>

  <div class="d-flex">
    <!-- SIDEBAR (Pin 放喺 Sidebar 頂) -->
    <nav class="sidebar" id="sidebar">
      <button id="pin-btn" class="btn btn-outline-secondary mb-3 w-100">📌 Pin Sidebar</button>
      <ul class="nav flex-column">
        <li class="nav-item"><a class="nav-link active" href="#">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Live Signals</a></li>
        <li class="nav-item ms-3"><a class="nav-link" href="#">My Signals</a></li>
        <li class="nav-item ms-3"><a class="nav-link" href="#">Register Signal</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Signal Group</a></li>
        <li class="nav-item"><a class="nav-link" href="#">User Portfolio</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Market News</a></li>
        <li class="nav-item"><a class="nav-link" href="#">World Monitor</a></li>
        <!-- 其他 P2 P3 ... -->
      </ul>
    </nav>

    <!-- MAIN -->
    <main class="flex-grow-1 p-4">
      <h1>Dashboard</h1>
      <!-- Live Cards -->
    </main>
  </div>

  <script>
    document.getElementById('pin-btn').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('pinned');
    });
  </script>
</body>
</html>
