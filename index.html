<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signal Helper</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>

    .dist-fill:hover { filter: brightness(1.15); }
    .heatmap-table { border-collapse: collapse; font-size: 0.75rem; }
    .heatmap-table td, .heatmap-table th { border: 1px solid #e5e7eb; padding: 6px; text-align: center; min-width: 32px; }
    .martingale-table { font-size: 0.85rem; }
    .martingale-table th { background: #f8fafc; }
    .expand-btn { cursor: pointer; font-size: 1.1rem; }
    .layer-detail { display: none; background: #f8fafc; padding: 10px; border-radius: 6px; margin-top: 6px; }
    .symbol-btn { margin: 3px; }
  </style>
</head>
<body>
  <!-- header、sidebar、user menu 完全保留之前版本 -->
  <header class="top-header"> ... </header>
  <!-- ... sidebar ... -->

  <main class="flex-grow-1 p-3">
    <!-- THA 頁面 -->
    <div id="page-tha" class="page">
      <!-- 上傳區 + analysisMenu 保留 -->
      <section class="panel"> ... </section>

      <div id="analysisArea" style="display:none;">
        <div class="analysis-menu" id="analysisMenu">
          <button class="active" data-block="overview">總覽 + 資金曲線</button>
          <button data-block="symbol-martingale">Symbol + 馬丁</button>
          <button data-block="mfe-mae">MFE + MAE</button>
          <button data-block="heatmap">Heat Map</button>
          <button data-block="drawdown">Drawdown</button>
          <button data-block="swot">SWOT</button>
        </div>

        <!-- 總覽區塊（已優化版）保留 -->
        <div class="analysis-block active" id="block-overview"> ... </div>

        <!-- ==================== 新增：Symbol + 馬丁層數 ==================== -->
        <div class="analysis-block" id="block-symbol-martingale">
          <section class="panel">
            <h2 class="panel-title">Symbol 一覽 + 馬丁層數分析</h2>
            <div id="symbolButtons" class="mb-3"></div>
            <div id="martingaleContent"></div>
          </section>
        </div>

        <!-- ==================== MFE + MAE ==================== -->
        <div class="analysis-block" id="block-mfe-mae">
          <section class="panel">
            <h2 class="panel-title">MFE + MAE 散點圖</h2>
            <div class="row">
              <div class="col-md-6">
                <h6>MFE vs Net Profit</h6>
                <div style="height: 280px;"><canvas id="mfeChart"></canvas></div>
              </div>
              <div class="col-md-6">
                <h6>MAE vs Net Profit</h6>
                <div style="height: 280px;"><canvas id="maeChart"></canvas></div>
              </div>
            </div>
            <div class="mt-3 small text-muted" id="mfeMaeSummary"></div>
          </section>
        </div>

        <!-- ==================== Heat Map ==================== -->
        <div class="analysis-block" id="block-heatmap">
          <section class="panel">
            <h2 class="panel-title">交易時間 Heat Map（星期 × 小時）</h2>
            <div id="heatmapContainer"></div>
            <div class="small text-muted mt-2">顏色越綠 = 平均利潤越高，數字為該時段交易數</div>
          </section>
        </div>

        <!-- Drawdown & SWOT 保留之前版本 -->
        <div class="analysis-block" id="block-drawdown"> ... </div>
        <div class="analysis-block" id="block-swot"> ... </div>
      </div>
    </div>
  </main>

  <script>
    // Firebase + 基本功能（login、switchPage 等）完全保留之前版本

    // ==================== 加強版 parseYourCSV（已包含 MFE/MAE 所需欄位） ====================
    function parseYourCSV(text) {
      // ... 之前加強版 parseYourCSV 完全保留 ...
      // 確保有 return { ..., bySymbol, overallStats, trades }
    }

    // ==================== 主要分析按鈕 ====================
    document.getElementById('analyzeBtn').addEventListener('click', () => {
      // ... 之前分析按鈕邏輯保留 ...
      // 最後加上：
      renderSymbolMartingale(result);
      renderMfeMae(result);
      renderHeatMap(result);
    });

    // ==================== 1. Symbol + 馬丁層數（真實實作） ====================
    function renderSymbolMartingale(result) {
      const container = document.getElementById('symbolButtons');
      const content = document.getElementById('martingaleContent');
      container.innerHTML = '';
      content.innerHTML = '';

      if (!result.bySymbol || Object.keys(result.bySymbol).length === 0) return;

      const sortedSymbols = Object.entries(result.bySymbol)
        .sort((a, b) => b[1].deals - a[1].deals)
        .slice(0, 12);

      sortedSymbols.forEach(([sym, stats]) => {
        const btn = document.createElement('button');
        btn.className = 'btn btn-outline-primary btn-sm symbol-btn';
        btn.textContent = `${sym} (${stats.deals})`;
        btn.onclick = () => showMartingaleDetail(sym, result);
        container.appendChild(btn);
      });

      // 預設顯示第一個
      if (sortedSymbols.length > 0) {
        showMartingaleDetail(sortedSymbols[0][0], result);
      }
    }

    function showMartingaleDetail(symbol, result) {
      const content = document.getElementById('martingaleContent');
      const symbolTrades = result.trades.filter(t => t.symbol === symbol);

      if (symbolTrades.length === 0) return;

      // 簡單馬丁層數偵測（按 Magic Number + 方向 + lot 遞增）
      const groups = {};
      symbolTrades.forEach(t => {
        const key = `${t.symbol}_${t.magic || 'default'}_${t.type}`;
        if (!groups[key]) groups[key] = [];
        groups[key].push(t);
      });

      let html = `<h5>${symbol} 馬丁分析（共 ${symbolTrades.length} 筆）</h5>`;
      html += `<div class="mb-3">總利潤: <span class="${symbolTrades.reduce((a,b)=>a+b.profit,0)>=0?'pos':'neg'}">$${symbolTrades.reduce((a,b)=>a+b.profit,0).toFixed(2)}</span></div>`;

      html += `<table class="table table-sm martingale-table"><thead><tr>
        <th>層數</th><th>交易數</th><th>總利潤</th><th>最大單筆虧損</th><th>平均持倉(小時)</th><th>操作</th>
      </tr></thead><tbody>`;

      let layerNum = 0;
      Object.values(groups).forEach(group => {
        // 簡單層數偵測：按時間排序 + lot 遞增
        group.sort((a,b) => a.openTime - b.openTime);
        let currentLayer = 1;
        let layerTrades = [group[0]];
        for (let i=1; i<group.length; i++) {
          if (group[i].lots > group[i-1].lots * 1.3) { // lot 明顯增加視為新層
            currentLayer++;
          }
          layerTrades.push(group[i]);
        }

        const layerProfit = layerTrades.reduce((a,b)=>a+b.profit,0);
        const maxLoss = Math.min(...layerTrades.map(t=>t.profit));
        const avgHold = layerTrades.reduce((a,b)=>a + (b.holdingHours || 0),0) / layerTrades.length;

        html += `<tr>
          <td>Layer ${currentLayer}</td>
          <td>${layerTrades.length}</td>
          <td class="${layerProfit>=0?'pos':'neg'}">$${layerProfit.toFixed(2)}</td>
          <td class="neg">$${maxLoss.toFixed(2)}</td>
          <td>${avgHold.toFixed(1)}</td>
          <td><span class="expand-btn" onclick="toggleLayerDetail(this, 'layer-${layerNum}')">➕</span></td>
        </tr>`;

        // 展開詳細
        html += `<tr id="layer-${layerNum}" class="layer-detail"><td colspan="6">
          <table class="table table-sm"><thead><tr>
            <th>Open Time</th><th>Type</th><th>Lots</th><th>Profit</th><th>Pips</th><th>Swap</th>
          </tr></thead><tbody>`;
        
        layerTrades.forEach(t => {
          html += `<tr>
            <td>${t.openTimeStr || ''}</td>
            <td>${t.type}</td>
            <td>${t.lots}</td>
            <td class="${t.profit>=0?'pos':'neg'}">$${t.profit.toFixed(2)}</td>
            <td>${t.pips.toFixed(1)}</td>
            <td>$${t.swap.toFixed(2)}</td>
          </tr>`;
        });
        html += `</tbody></table></td></tr>`;
        layerNum++;
      });

      html += `</tbody></table>`;
      content.innerHTML = html;
    }

    function toggleLayerDetail(btn, id) {
      const detail = document.getElementById(id);
      if (detail.style.display === 'table-row') {
        detail.style.display = 'none';
        btn.textContent = '➕';
      } else {
        detail.style.display = 'table-row';
        btn.textContent = '➖';
      }
    }

    // ==================== 2. MFE + MAE（使用 CSV Max Profit / Max Loss） ====================
    function renderMfeMae(result) {
      const mfeCtx = document.getElementById('mfeChart').getContext('2d');
      const maeCtx = document.getElementById('maeChart').getContext('2d');

      if (window.mfeChartInstance) window.mfeChartInstance.destroy();
      if (window.maeChartInstance) window.maeChartInstance.destroy();

      const mfeData = result.trades.map(t => ({
        x: t.maxProfit || 0,   // 使用 CSV Max Profit 作為 MFE
        y: t.profit
      }));

      const maeData = result.trades.map(t => ({
        x: Math.abs(t.maxLoss || 0), // 使用 Max Loss 作為 MAE
        y: t.profit
      }));

      window.mfeChartInstance = new Chart(mfeCtx, {
        type: 'scatter',
        data: { datasets: [{ label: 'MFE vs Profit', data: mfeData, backgroundColor: '#16a34a' }] },
        options: { responsive: true, plugins: { legend: { display: false } } }
      });

      window.maeChartInstance = new Chart(maeCtx, {
        type: 'scatter',
        data: { datasets: [{ label: 'MAE vs Profit', data: maeData, backgroundColor: '#dc2626' }] },
        options: { responsive: true, plugins: { legend: { display: false } } }
      });

      // 簡單統計
      const avgMFE = mfeData.reduce((a,b)=>a+b.x,0) / mfeData.length;
      const avgMAE = maeData.reduce((a,b)=>a+b.x,0) / maeData.length;
      document.getElementById('mfeMaeSummary').innerHTML = 
        `平均 MFE: <span class="pos">$${avgMFE.toFixed(2)}</span> | 平均 MAE: <span class="neg">$${avgMAE.toFixed(2)}</span>`;
    }

    // ==================== 3. Heat Map（真實星期 × 小時） ====================
    function renderHeatMap(result) {
      const container = document.getElementById('heatmapContainer');
      if (!result.trades || result.trades.length === 0) return;

      const heatmap = Array.from({length: 7}, () => Array(24).fill({profit:0, count:0, win:0}));

      result.trades.forEach(t => {
        if (!t.openTime) return;
        const day = t.openTime.getDay();      // 0=Sunday
        const hour = t.openTime.getHours();
        heatmap[day][hour].profit += t.profit;
        heatmap[day][hour].count += 1;
        if (t.profit > 0) heatmap[day][hour].win += 1;
      });

      let html = `<table class="heatmap-table"><thead><tr><th></th>`;
      for (let h=0; h<24; h++) html += `<th>${h}</th>`;
      html += `</tr></thead><tbody>`;

      const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      for (let d=0; d<7; d++) {
        html += `<tr><th>${days[d]}</th>`;
        for (let h=0; h<24; h++) {
          const cell = heatmap[d][h];
          const avg = cell.count > 0 ? cell.profit / cell.count : 0;
          const winrate = cell.count > 0 ? (cell.win / cell.count * 100).toFixed(0) : 0;
          const color = avg > 5 ? '#86efac' : avg > 0 ? '#fef08a' : avg < -5 ? '#fecaca' : '#f3f4f6';
          html += `<td style="background:${color}" title="Avg: $${avg.toFixed(1)} | Win: ${winrate}%">${cell.count}</td>`;
        }
        html += `</tr>`;
      }
      html += `</tbody></table>`;
      container.innerHTML = html;
    }

    // 初始化
    switchPage('dashboard');
  </script>
</body>
</html>
