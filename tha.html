<!DOCTYPE html>
<html lang="zh-HK" data-mode="light" data-theme="wood">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THA - Trade History Analyzer</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #f8f9f0; color: #2c3e2f; margin: 0; }
    .top-header { background: linear-gradient(90deg, #4a7043, #6b9b5e); color: white; padding: 0.6rem 1.5rem; height: 62px; }
    .panel { background: white; border-radius: 16px; padding: 1.5rem; box-shadow: 0 8px 25px rgba(74,112,67,0.12); }
  </style>
</head>
<body>
  <!-- HEADER -->
  <header class="top-header">
    <div class="d-flex justify-content-between align-items-center h-100">
      <div class="d-flex align-items-center gap-3">
        <div class="magic-orb">📈</div>
        <h5 class="mb-0 fw-bold">Trade History Analyzer (THA)</h5>
      </div>
      <div class="d-flex align-items-center gap-3">
        <button class="btn btn-light btn-sm" onclick="window.location.href='index.html'">← Back to Dashboard</button>
      </div>
    </div>
  </header>

  <div class="p-4">
    <div class="panel">
      <h4>1. Upload MT4/MT5 Report CSV</h4>
      <input type="file" id="csvFile" accept=".csv" class="form-control mb-3">
      <button class="btn btn-primary" onclick="analyzeTHA()">🚀 Start Analysis</button>
    </div>

    <!-- Summary + Charts -->
    <div class="row mt-4">
      <div class="col-lg-8">
        <div class="panel">
          <h5>Equity Curve</h5>
          <canvas id="equityChart" height="300"></canvas>
        </div>
      </div>
      <div class="col-lg-4">
        <div class="panel">
          <h5>Summary</h5>
          <p>Total Profit: <strong>+ $12,345</strong></p>
          <p>Win Rate: <strong>82%</strong></p>
          <p>Max DD: <strong>-8% (USD -2,100)</strong></p>
        </div>
      </div>
    </div>
  </div>

  <script>
    function analyzeTHA() {
      alert("THA Analysis Started (Demo)");
      // 之後加真實解析
    }

    // Demo Chart
    new Chart(document.getElementById('equityChart'), {
      type: 'line',
      data: { labels: ['Jan','Feb','Mar','Apr','May'], datasets: [{ data: [1000,2800,4500,6200,9200], borderColor: '#4a7043', tension: 0.4 }] },
      options: { responsive: true }
    });
  </script>
</body>
</html>
